    <meta charset="UTF-8">

    <title>つむぎ部屋 | 補足資料まとめ</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
    <video autoplay muted loop playsinline class="hero-video desktop-only">
        <source src="./videos/haikei.mp4" type="video/mp4">
    </video>
    <video autoplay muted loop playsinline class="hero-video mobile-only">
        <source src="./videos/mobile_haikei.mp4" type="video/mp4">
    </video>
    <div class="crt-overlay"></div>
    <div class="scanlines"></div>
    
    <header>
        <div class="container header-content">
            <h1 class="glitch" data-text="TUMUGI ROOM DATA HUB">TUMUGI ROOM DATA HUB</h1>
            <p class="subtitle">補足資料データベース</p>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="動画タイトルを検索..." aria-label="Search videos">
                <div class="search-glow"></div>
            </div>
            <a href="https://tumugi-lp.vercel.app" class="header-cta-btn" target="_blank" rel="noopener noreferrer">資産を育てるつむぎを見る</a>
        </div>

    <main class="container">
        <section id="video-grid" class="video-grid">
            <!-- Cards will be injected by main.js -->
        </section>
    </main>

    <footer>
        <div class="container footer-content">
            <p>&copy; 2026 つむぎ部屋 | <a href="https://www.shota-world.jp/" target="_blank" rel="noopener noreferrer">Designed by Shota Niwano</a></p>
